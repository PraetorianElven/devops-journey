name: CI-CD

on:
  push:
    branches:
      - main

env:
  IMAGE_NAME: flask-devops-demo

jobs:

  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt

      - name: Run Tests
        run: |
          pytest -v

  build-and-push:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push Image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

  notify:
    needs:
      - test
      - build-and-push

    if: always()

    runs-on: ubuntu-latest

    steps:

      - name: Notify Success
        if: |
          needs.test.result == 'success' &&
          needs.build-and-push.result == 'success'
        run: |
          curl -H "Content-Type: application/json" \
          -d '{
            "content":"✅ PIPELINE EXECUTADA COM SUCESSO\n\nRepositório: ${{ github.repository }}\nBranch: ${{ github.ref_name }}\nCommit: ${{ github.sha }}\nImagem publicada no Docker Hub com sucesso."
          }' \
          "${{ secrets.DISCORD_WEBHOOK_URL }}"

      - name: Notify Failure
        if: |
          needs.test.result != 'success' ||
          needs.build-and-push.result != 'success'
        run: |
          curl -H "Content-Type: application/json" \
          -d '{
            "content":"❌ PIPELINE FALHOU\n\nRepositório: ${{ github.repository }}\nBranch: ${{ github.ref_name }}\nCommit: ${{ github.sha }}\nTest Result: ${{ needs.test.result }}\nBuild Result: ${{ needs.build-and-push.result }}"
          }' \
          "${{ secrets.DISCORD_WEBHOOK_URL }}"