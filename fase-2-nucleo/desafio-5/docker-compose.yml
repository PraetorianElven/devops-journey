services:

  app1:
    build:
      context: ./app1
    container_name: app1

  app2:
    build:
      context: ./app2
    container_name: app2

  nginx:
    image: nginx:alpine
    container_name: nginx

    ports:
      - "80:80"
      - "443:443"

    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx:/etc/nginx/certs:ro

    depends_on:
      - app1
      - app2
