


services:
  web:
    build: .

    environment:
       DB_HOST: db
       DB_PORT: 5432
       DB_NAME: postgres
       DB_USER: postgres
       DB_PASSWORD: password
    depends_on:
      - db
    networks:
      - app-network

  db:
    image: postgres:13
    environment:
       POSTGRES_USER: postgres
       POSTGRES_PASSWORD: password
       POSTGRES_DB: postgres

    networks:
      - app-network

  nginx:
    image: nginx:latest
    ports:
      - "8989:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - web
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

